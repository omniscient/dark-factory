name: ${FACTORY_INSTANCE:-dark-factory}

# Dark Factory — standalone deploy compose
#
# Runs the Backlog Scheduler + its Docker Socket Proxy for a single project instance.
# Copy deploy/instance.env.example → deploy/instance.env, fill in your values, then:
#
#   docker compose -f deploy/docker-compose.yml up -d
#
# PROJECT_DIR (env var, default: parent of deploy/) must point to the target project
# checkout on the host so the scheduler can read it as /workspace/project.
#
#   PROJECT_DIR=/path/to/your-repo docker compose -f deploy/docker-compose.yml up -d
#
# IMAGE_TAG (env var, default: latest) pins the factory image version.
#
# FACTORY_INSTANCE (env var, default: dark-factory) scopes the compose project,
# container names, and the scheduler state volume so several instances (one per
# target repo) can coexist on one host. Bring up a second instance with its own
# env file supplying interpolation values:
#
#   docker compose --env-file deploy/instances/<repo>/instance.env \
#     -f deploy/docker-compose.yml up -d
#
# FACTORY_INSTANCE must ALSO be set inside instance.env (the scheduler passes it
# to dispatched run containers; run-compose.yml derives the shared state-volume
# name from it — see the sentinel note there).

services:

  # Docker Socket Proxy (scheduler) — allows container lifecycle ops
  # (create/run/stop/delete) via POST+CONTAINERS for `docker compose run`;
  # BUILD/EXEC stay 0 (run never builds/execs).
  docker-socket-proxy-scheduler:
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: ${FACTORY_INSTANCE:-dark-factory}-socket-proxy-scheduler
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      # `docker compose run dark-factory` (dispatch) must look up the service's
      # networks and its scheduler_state volume before creating the container —
      # both were 0, which 403'd every dispatch after a proxy recreate.
      # BUILD/EXEC stay 0 (run never builds/execs).
      NETWORKS: 1
      VOLUMES: 1
      BUILD: 0
      SERVICES: 0
      EXEC: 0
      AUTH: 0
      SECRETS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dark-factory-net

  # Backlog Scheduler — polls the GitHub project board and dispatches factory runs
  backlog-scheduler:
    image: ghcr.io/omniscient/dark-factory:${IMAGE_TAG:-latest}
    container_name: ${FACTORY_INSTANCE:-dark-factory}-scheduler
    restart: unless-stopped
    entrypoint: ["/opt/dark-factory/scheduler.sh"]
    env_file:
      # FACTORY_INSTANCE_ENV (interpolation env var, default instance.env) lets a
      # second instance point at its own uncommitted env file, e.g.
      #   docker compose --env-file deploy/instance-self.env -f deploy/docker-compose.yml up -d
      # with FACTORY_INSTANCE_ENV=instance-self.env set inside that same file.
      - path: ${FACTORY_INSTANCE_ENV:-instance.env}
        required: true
    environment:
      FACTORY_IMAGE: "ghcr.io/omniscient/dark-factory:${IMAGE_TAG:-latest}"
      DOCKER_HOST: tcp://docker-socket-proxy-scheduler:2375
      # Interpolated at `up` time and passed through so dispatch (docker compose
      # inside this container) names the run project/volume consistently even
      # when instance.env omits FACTORY_INSTANCE.
      FACTORY_INSTANCE: ${FACTORY_INSTANCE:-dark-factory}
    depends_on:
      - docker-socket-proxy-scheduler
    volumes:
      - dark_factory_state:/var/lib/dark-factory
      # Bind-mount the target project checkout read-only.
      # Set PROJECT_DIR on the host to the absolute path of your project checkout.
      # Default (..) resolves to the parent of the deploy/ directory.
      - ${PROJECT_DIR:-..}:/workspace/project:ro
    networks:
      - dark-factory-net
    # Optional: structured logging to Seq/Gelf. Comment out if you don't run Seq.
    # logging:
    #   driver: gelf
    #   options:
    #     gelf-address: "udp://host.docker.internal:12201"
    #     tag: "backlog-scheduler"

networks:
  dark-factory-net:
    driver: bridge

volumes:
  dark_factory_state:
    # MUST stay in lockstep with run-compose.yml's scheduler_state volume name —
    # run containers write the main-red sentinel here; the scheduler reads it.
    name: ${FACTORY_INSTANCE:-dark-factory}-scheduler-state
