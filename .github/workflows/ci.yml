name: CI
on:
  pull_request:
    branches: [main]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pytest pyyaml aiohttp
      - run: python -m pytest tests/ -v
        env: { PYTHONPATH: scripts }
      - run: bash tests/test_identity.sh
      - run: bash tests/test_hooks.sh
      - run: bash tests/test_smoke_gate.sh
      - run: bash tests/test_run_compose.sh
      - run: bash tests/test_model_proxy_compose.sh
      - run: bash tests/test_model_proxy_smoke.sh
      - run: bash tests/test_entrypoint_current_run.sh
      - run: bash tests/test_cost_report_endpoint.sh
      - run: bash tests/test_cost_report_harness_economics.sh
      - run: bash tests/test_run_record_hermetic.sh
      - run: bash tests/test_entrypoint_cost_report_regression.sh
  dag-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml
      - run: python scripts/check_workflow_dag.py workflows/archon-dark-factory.yaml
      - run: python scripts/check_workflow_when.py workflows/archon-dark-factory.yaml
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f Dockerfile -t dark-factory:pr .
